<!-- assets/images/cyber-fox.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Неоновое свечение (Розовый) -->
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur1" />
      <feGaussianBlur stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Неоновое свечение (Зеленый) -->
    <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Градиент заливки полигонов -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050508" stop-opacity="0.8" />
    </linearGradient>

    <!-- Паттерн сетки -->
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="rgba(255, 45, 149, 0.2)" />
    </pattern>

    <style>
      .eye {
        transform-origin: center;
        animation: eyePulse 3s infinite alternate;
      }
      @keyframes eyePulse {
        0% { filter: drop-shadow(0 0 2px #39ff14); opacity: 0.8; }
        100% { filter: drop-shadow(0 0 8px #39ff14) drop-shadow(0 0 15px #39ff14); opacity: 1; }
      }
    </style>
  </defs>

  <!-- БАЗА ЛИСЫ (ПОЛИГОНАЛЬНАЯ СЕТКА) -->
  <g stroke="#ff2d95" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#neonPink)">
    
    <!-- Основной контур с полупрозрачной заливкой -->
    <polygon points="60,105 30,80 12,55 22,15 42,40 60,32 78,40 98,15 108,55 90,80" fill="url(#glassFill)" />
    
    <!-- Наложение точечной сетки на морду -->
    <polygon points="60,105 30,80 12,55 22,15 42,40 60,32 78,40 98,15 108,55 90,80" fill="url(#grid)" />

    <!-- Внутренние грани (Wireframe) -->
    <!-- Левая щека -->
    <polygon points="60,105 30,80 48,65 60,75" fill="rgba(255, 45, 149, 0.05)" />
    <polygon points="30,80 12,55 48,65" fill="none" />
    
    <!-- Правая щека -->
    <polygon points="60,105 90,80 72,65 60,75" fill="rgba(255, 45, 149, 0.05)" />
    <polygon points="90,80 108,55 72,65" fill="none" />

    <!-- Переносица -->
    <polygon points="60,75 48,65 60,32 72,65" fill="rgba(255, 45, 149, 0.1)" />

    <!-- Уши внутренние -->
    <polyline points="22,15 48,65 42,40" fill="none" />
    <polyline points="98,15 72,65 78,40" fill="none" />
    
    <!-- Лоб -->
    <polyline points="12,55 48,65 42,40" fill="none" />
    <polyline points="108,55 72,65 78,40" fill="none" />

  </g>

  <!-- КИБЕР-ГЛАЗА (ЗЕЛЕНЫЙ НЕОН) -->
  <g class="eye" filter="url(#neonGreen)">
    <!-- Левый глаз -->
    <polygon points="32,58 44,62 40,65 30,61" fill="#39ff14" />
    <!-- Правый глаз -->
    <polygon points="88,58 76,62 80,65 90,61" fill="#39ff14" />
  </g>

</svg>